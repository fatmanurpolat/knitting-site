# Build the static site and publish it to GitHub Pages.
#
# Setup (once): repo → Settings → Pages → "Build and deployment" → Source =
# "GitHub Actions". Then every push to main redeploys.
#
# NOTE: if your site lives at username.github.io/<repo>/ (a *project* page),
# uncomment BASE_PATH below so asset/links resolve under the sub-path. If you
# use a custom domain or a user/org page (served at the domain root), leave it.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run generate
        # env:
        #   BASE_PATH: "/${{ github.event.repository.name }}"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist-site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

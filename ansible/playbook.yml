---
# =============================================================================
# Örgülog — provision & deploy
#
#   cd ansible
#   cp inventory.example.ini inventory.ini   # edit host + user
#   # edit group_vars/all.yml (domain, brand, TLS)
#   ansible-playbook playbook.yml
#
# Roles run in order: base packages → Node.js → app (build + systemd) → nginx.
# =============================================================================
- name: Provision and deploy Örgülog
  hosts: web
  become: true
  gather_facts: true

  vars_files:
    - secrets.yml   # gitignored: admin_password, session_secret, db_password

  roles:
    - common   # base packages, app user, rsync
    - nodejs   # Node.js LTS from NodeSource
    - postgres # Postgres server + app database/role (dashboard storage)
    - app      # push code, npm ci, build, systemd service
    # Host nginx only on a dedicated box. On a server whose edge is already a
    # reverse proxy (e.g. the Klip Caddy here), keep manage_nginx=false.
    - role: nginx
      when: manage_nginx | default(true)

---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - git
      - rsync
      - ufw
    state: present

- name: Create app group
  ansible.builtin.group:
    name: "{{ app_group }}"
    system: true
    state: present

- name: Create app system user
  ansible.builtin.user:
    name: "{{ app_user }}"
    group: "{{ app_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ app_dir }}"
    create_home: false

- name: Create app directory
  ansible.builtin.file:
    path: "{{ app_dir }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0755"

# Allow by port number (not the "Nginx Full" profile, which only exists after
# nginx is installed) so enabling ufw never blocks SSH or the web server.
- name: Allow SSH / HTTP / HTTPS through the firewall
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - "22"
    - "80"
    - "443"

- name: Enable the firewall (default deny incoming)
  community.general.ufw:
    state: enabled
    policy: deny

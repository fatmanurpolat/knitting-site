---
# ── Get the source onto the server ───────────────────────────────────────────
# Two modes: clone from git if `app_repo` is set, otherwise rsync the local
# working copy (everything except build artefacts and secrets).
- name: Deploy from git repository
  when: app_repo | length > 0
  ansible.builtin.git:
    repo: "{{ app_repo }}"
    dest: "{{ app_dir }}"
    version: "{{ app_branch }}"
    force: true
  notify: restart app

- name: Deploy local working copy with rsync
  when: app_repo | length == 0
  ansible.posix.synchronize:
    src: "{{ playbook_dir }}/../"
    dest: "{{ app_dir }}/"
    delete: true
    recursive: true
    rsync_opts:
      - "--exclude=.git"
      - "--exclude=node_modules"
      - "--exclude=dist"
      - "--exclude=ansible"
      - "--exclude=.env"
      - "--exclude=.DS_Store"
  notify: restart app

- name: Ensure app files are owned by the app user
  ansible.builtin.file:
    path: "{{ app_dir }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    recurse: true

# ── Install & build ──────────────────────────────────────────────────────────
- name: Install dependencies (including dev, needed to build)
  ansible.builtin.command:
    cmd: npm ci --include=dev
    chdir: "{{ app_dir }}"
  become_user: "{{ app_user }}"
  environment:
    NODE_ENV: development
  changed_when: true

- name: Compile TypeScript to dist/
  ansible.builtin.command:
    cmd: npm run build
    chdir: "{{ app_dir }}"
  become_user: "{{ app_user }}"
  changed_when: true

- name: Prune dev dependencies for a lean runtime
  ansible.builtin.command:
    cmd: npm prune --omit=dev
    chdir: "{{ app_dir }}"
  become_user: "{{ app_user }}"
  changed_when: true

# ── systemd service ──────────────────────────────────────────────────────────
- name: Install systemd unit
  ansible.builtin.template:
    src: orgulog.service.j2
    dest: "/etc/systemd/system/{{ app_name }}.service"
    mode: "0644"
  notify:
    - reload systemd
    - restart app

- name: Enable and start the app service
  ansible.builtin.systemd:
    name: "{{ app_name }}"
    enabled: true
    state: started
    daemon_reload: true
